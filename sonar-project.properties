# Configuracao do SonarCloud para o projeto wmixvideo/nfe.
#
# Os arquivos em **/webservices/gerado/** sao stubs gerados automaticamente pelo
# Axis2 (wsdl2java) e sao ~95% identicos entre si (CTeRecepcaoSimp/OS/Sinc/...),
# alem de carregarem o boilerplate padrao do gerador (metodos Factory.parse de
# alta complexidade, literais repetidos). Excluir esse codigo gerado da analise:
#
#   - sonar.cpd.exclusions -> remove da deteccao de duplicacao (resolve a metrica
#     "Duplication on New Code" que reprova o Quality Gate);
#   - sonar.exclusions      -> remove da analise por completo (tambem elimina as
#     anotacoes de complexidade/literais no codigo gerado).
#
# Observacao: no modo Automatic Analysis o SonarCloud pode ignorar este arquivo;
# nesse caso a exclusao deve ser configurada no painel do projeto em sonarcloud.io
# (Administration -> Analysis Scope).

sonar.cpd.exclusions=**/webservices/gerado/**
sonar.exclusions=**/webservices/gerado/**
